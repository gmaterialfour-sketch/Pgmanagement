services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pg_rental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pg_rental?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=change_me_access
      - JWT_REFRESH_SECRET=change_me_refresh
      - WEB_ORIGIN=http://localhost:3000
      - API_PORT=5000
    depends_on:
      - db
      - redis

  backend-java:
    build:
      context: ./apps/backend-java
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/pg_rental
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=replace-with-a-long-random-access-secret-java-version
      - WEB_ORIGIN=http://localhost:3000
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
