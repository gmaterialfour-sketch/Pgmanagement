spring.application.name=pg-rental-backend

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pg_rental}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Security
jwt.secret=${JWT_ACCESS_SECRET:replace-with-a-long-random-access-secret-java-version}
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
jwt.expiration=3600000
jwt.refreshExpiration=604800000

# CORS
app.web.origin=${WEB_ORIGIN:http://localhost:3000}

# Server
server.port=5000
